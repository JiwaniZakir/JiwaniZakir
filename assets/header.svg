<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#050B18"/>
      <stop offset="40%" stop-color="#0B1628"/>
      <stop offset="100%" stop-color="#162447"/>
    </linearGradient>
    <linearGradient id="cityGlow" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </linearGradient>
    <style>
      @keyframes twinkle1 { 0%,100% { opacity: 0.2; } 50% { opacity: 1; } }
      @keyframes twinkle2 { 0%,100% { opacity: 0.5; } 50% { opacity: 0.9; } }
      @keyframes twinkle3 { 0%,100% { opacity: 0.1; } 50% { opacity: 0.8; } }
      @keyframes windowGlow { 0%,100% { opacity: 0.25; } 50% { opacity: 0.8; } }
      @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
      .s1 { animation: twinkle1 3s ease-in-out infinite; }
      .s2 { animation: twinkle2 2.5s ease-in-out infinite 0.8s; }
      .s3 { animation: twinkle3 4s ease-in-out infinite 1.5s; }
      .s4 { animation: twinkle1 3.5s ease-in-out infinite 2s; }
      .s5 { animation: twinkle2 2s ease-in-out infinite 0.3s; }
      .w1 { animation: windowGlow 4s ease-in-out infinite; }
      .w2 { animation: windowGlow 3s ease-in-out infinite 1s; }
      .w3 { animation: windowGlow 5s ease-in-out infinite 2s; }
      .name-text {
        font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
        font-size: 54px;
        font-weight: 700;
        fill: #FFFFFF;
        animation: fadeIn 2s ease-in;
      }
      .subtitle-text {
        font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
        font-size: 14px;
        font-weight: 400;
        fill: #58A6FF;
        letter-spacing: 6px;
        animation: fadeIn 3s ease-in;
      }
    </style>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="300" fill="url(#sky)"/>

  <!-- City glow on horizon -->
  <ellipse cx="600" cy="300" rx="550" ry="80" fill="url(#cityGlow)"/>

  <!-- Stars -->
  <circle class="s1" cx="80" cy="25" r="1.2" fill="#fff"/>
  <circle class="s2" cx="180" cy="48" r="0.8" fill="#fff"/>
  <circle class="s3" cx="320" cy="15" r="1.0" fill="#fff"/>
  <circle class="s4" cx="450" cy="58" r="0.7" fill="#fff"/>
  <circle class="s5" cx="550" cy="22" r="1.1" fill="#fff"/>
  <circle class="s1" cx="680" cy="42" r="0.9" fill="#fff"/>
  <circle class="s2" cx="780" cy="12" r="1.3" fill="#fff"/>
  <circle class="s3" cx="900" cy="52" r="0.8" fill="#fff"/>
  <circle class="s4" cx="1000" cy="32" r="1.0" fill="#fff"/>
  <circle class="s5" cx="1100" cy="18" r="0.7" fill="#fff"/>
  <circle class="s1" cx="150" cy="72" r="0.6" fill="#fff"/>
  <circle class="s2" cx="380" cy="82" r="0.9" fill="#fff"/>
  <circle class="s3" cx="620" cy="68" r="0.5" fill="#fff"/>
  <circle class="s4" cx="850" cy="78" r="0.8" fill="#fff"/>
  <circle class="s5" cx="1050" cy="62" r="0.6" fill="#fff"/>
  <circle class="s3" cx="50" cy="55" r="0.7" fill="#fff"/>
  <circle class="s1" cx="1150" cy="40" r="0.9" fill="#fff"/>
  <circle class="s4" cx="270" cy="35" r="0.6" fill="#fff"/>
  <circle class="s2" cx="730" cy="28" r="0.8" fill="#fff"/>

  <!-- Name -->
  <text class="name-text" x="600" y="125" text-anchor="middle">Zakir Jiwani</text>
  <text class="subtitle-text" x="600" y="152" text-anchor="middle">PHILADELPHIA, PA</text>

  <!-- ============== PHILADELPHIA SKYLINE ============== -->

  <!-- Far left small buildings -->
  <rect x="0" y="242" width="40" height="58" fill="#0D1117"/>
  <rect x="45" y="252" width="30" height="48" fill="#0D1117"/>
  <rect x="80" y="238" width="35" height="62" fill="#0D1117"/>
  <rect x="120" y="248" width="25" height="52" fill="#0D1117"/>

