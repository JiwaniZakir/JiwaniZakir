  <rect x="454" y="178" width="4" height="16" fill="#0D1117"/>

  <!-- Two Liberty Place -->
  <rect x="482" y="202" width="28" height="98" fill="#0D1117"/>
  <polygon points="496,202 482,218 510,218" fill="#0D1117"/>
