  <rect class="w3" x="406" y="260" width="3" height="3" rx="0.5" fill="#58A6FF" opacity="0.4"/>
  <rect class="w1" x="402" y="275" width="3" height="3" rx="0.5" fill="#58A6FF" opacity="0.5"/>

  <!-- One Liberty -->
  <rect class="w2" x="449" y="222" width="3" height="3" rx="0.5" fill="#58A6FF" opacity="0.5"/>
  <rect class="w3" x="459" y="238" width="3" height="3" rx="0.5" fill="#58A6FF" opacity="0.4"/>
