  <rect class="w1" x="762" y="248" width="2" height="2" rx="0.5" fill="#58A6FF" opacity="0.3"/>
  <rect class="w3" x="835" y="255" width="2" height="2" rx="0.5" fill="#58A6FF" opacity="0.4"/>
  <rect class="w2" x="875" y="268" width="2" height="2" rx="0.5" fill="#58A6FF" opacity="0.3"/>
