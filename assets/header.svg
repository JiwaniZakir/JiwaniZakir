  <rect x="1068" y="262" width="35" height="38" fill="#0D1117"/>
  <rect x="1110" y="258" width="28" height="42" fill="#0D1117"/>
  <rect x="1145" y="265" width="25" height="35" fill="#0D1117"/>
  <rect x="1175" y="268" width="25" height="32" fill="#0D1117"/>

  <!-- Ground line -->
