      <text x="77.5" y="62.0" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#8B949E">Messages + Joins</text>
      <line x1="125" y1="48" x2="155" y2="48" stroke="#58A6FF" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
