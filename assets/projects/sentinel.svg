      <text x="310" y="222" font-family="'Segoe UI',sans-serif" font-size="20" font-weight="700" fill="#3FB950">HITL</text>
      <text x="310" y="236" font-family="'Segoe UI',sans-serif" font-size="9" fill="#8B949E">Human Review</text>
      <text x="430" y="222" font-family="'Segoe UI',sans-serif" font-size="20" font-weight="700" fill="#F78166">24/7</text>
      <text x="430" y="236" font-family="'Segoe UI',sans-serif" font-size="9" fill="#8B949E">Community Bot</text>
