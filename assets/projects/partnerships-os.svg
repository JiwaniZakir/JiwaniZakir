      <line x1="224" y1="140" x2="180" y2="110" stroke="#FF7B72" stroke-width="0.8" opacity="0.4"/>
      <line x1="80" y1="76" x2="80" y2="124" stroke="#8B949E" stroke-width="0.5" opacity="0.3" stroke-dasharray="2,2"/>
