      <text x="310" y="218" font-family="'Segoe UI',sans-serif" font-size="20" font-weight="700" fill="#3FB950">Notion</text>
      <text x="310" y="232" font-family="'Segoe UI',sans-serif" font-size="9" fill="#8B949E">CRM Sync</text>
      <text x="430" y="218" font-family="'Segoe UI',sans-serif" font-size="20" font-weight="700" fill="#F78166">Real-time</text>
      <text x="430" y="232" font-family="'Segoe UI',sans-serif" font-size="9" fill="#8B949E">Scoring</text>
