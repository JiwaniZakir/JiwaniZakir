<svg xmlns="http://www.w3.org/2000/svg" width="580" height="320" viewBox="0 0 580 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D2A8FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#D2A8FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#D2A8FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="card"><rect width="580" height="320" rx="16"/></clipPath>
  </defs>

  <g clip-path="url(#card)">
    <!-- Background -->
    <rect width="580" height="320" fill="url(#bg)"/>
    <rect x="0" y="0" width="580" height="1" fill="url(#accent-line)"/>

    <!-- Header -->
    <g transform="translate(24, 28)">
      <circle cx="10" cy="10" r="10" fill="#D2A8FF" opacity="0.15"/><circle cx="7" cy="7" r="2" fill="#D2A8FF"/><circle cx="13" cy="13" r="2" fill="#D2A8FF"/><circle cx="13" cy="7" r="2" fill="#D2A8FF"/><line x1="7" y1="7" x2="13" y2="13" stroke="#D2A8FF" stroke-width="1"/><line x1="7" y1="7" x2="13" y2="7" stroke="#D2A8FF" stroke-width="1"/>
