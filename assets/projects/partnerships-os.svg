      <text x="160" y="104" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" font-weight="600" fill="#D2A8FF">Partner</text>
      <circle cx="80" cy="60" r="16" fill="#58A6FF" opacity="0.15" stroke="#58A6FF" stroke-width="0.8"/>
      <text x="80" y="64" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="7" fill="#58A6FF">Contact</text>
